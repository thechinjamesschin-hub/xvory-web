<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xvory — Cloud Dashboard</title>
    <meta name="description" content="Xvory Cloud Dashboard — Manage your Lua configurations remotely.">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="xvory-theme.css">
</head>

<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="bg-particles"></div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-wrapper">
            <div class="login-glow"></div>
            <div class="login-box">
                <div class="login-brand">
                    <div class="brand-icon">
                        <svg width="44" height="44" viewBox="0 0 40 40" fill="none">
                            <path d="M20 2L37 11V29L20 38L3 29V11L20 2Z" stroke="url(#grad1)" stroke-width="2"
                                fill="none" />
                            <path d="M20 8L31 14V26L20 32L9 26V14L20 8Z" fill="url(#grad1)" opacity="0.12" />
                            <path d="M20 14L25 17V23L20 26L15 23V17L20 14Z" fill="url(#grad1)" />
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#ff3a3a" />
                                    <stop offset="100%" stop-color="#ff6b6b" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>XVORY</h1>
                    <p class="brand-tagline">Cloud Execution Platform</p>
                </div>
                <div class="login-form">
                    <label for="key-input">Authentication Key</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0110 0v4" />
                        </svg>
                        <input type="password" id="key-input" placeholder="Enter your key...">
                    </div>
                    <button id="login-btn">
                        <span>Authenticate</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                    <div id="login-error" class="error-msg"></div>
                </div>
                <div class="login-footer">
                    <a href="https://discord.gg/TbXGkktFM" target="_blank" class="discord-link" id="discord-login-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286z" />
                        </svg>
                        <span>Join Discord</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="screen">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
                            <path d="M20 2L37 11V29L20 38L3 29V11L20 2Z" stroke="url(#grad2)" stroke-width="2"
                                fill="none" />
                            <path d="M20 14L25 17V23L20 26L15 23V17L20 14Z" fill="url(#grad2)" />
                            <defs>
                                <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#ff3a3a" />
                                    <stop offset="100%" stop-color="#ff6b6b" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="logo-text">XVORY</span>
                </div>
            </div>

            <div class="nav-section">
                <span class="nav-label">Navigation</span>
                <ul class="nav-links">
                    <li class="active" data-tab="dashboard" id="nav-dashboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1" />
                            <rect x="14" y="3" width="7" height="7" rx="1" />
                            <rect x="3" y="14" width="7" height="7" rx="1" />
                            <rect x="14" y="14" width="7" height="7" rx="1" />
                        </svg>
                        <span>Dashboard</span>
                    </li>
                    <li data-tab="config" id="nav-config">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="16 18 22 12 16 6" />
                            <polyline points="8 6 2 12 8 18" />
                        </svg>
                        <span>Config Editor</span>
                    </li>
                </ul>
            </div>

            <div class="sidebar-footer">
                <a href="https://discord.gg/X7WxKZyw" target="_blank" class="sidebar-discord-btn"
                    id="discord-sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286z" />
                    </svg>
                    <span>Discord Server</span>
                </a>
                <div class="sidebar-version">v1.1.0</div>
            </div>
        </nav>

        <main class="content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="topbar-right">
                    <div class="status-pill" id="status-pill">
                        <span class="status-dot"></span>
                        <span>Connected</span>
                    </div>
                    <button class="topbar-btn" id="logout-btn" title="Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="dashboard-grid">
                    <div class="dash-card" id="card-key">
                        <div class="dash-card-header">
                            <div class="dash-card-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                                </svg>
                            </div>
                            <h3>Authentication Key</h3>
                        </div>
                        <div class="key-display">
                            <code id="masked-key" data-key="">••••••••••••</code>
                            <button id="toggle-key-btn" class="key-toggle-btn" title="Toggle key visibility">
                                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="dash-card" id="card-status">
                        <div class="dash-card-header">
                            <div class="dash-card-icon accent-green">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                                    <polyline points="22 4 12 14.01 9 11.01" />
                                </svg>
                            </div>
                            <h3>Active Config</h3>
                        </div>
                        <div class="status-display">
                            <span id="active-config-name" class="active-config-label">None selected</span>
                        </div>
                    </div>

                    <div class="dash-card" id="card-configs">
                        <div class="dash-card-header">
                            <div class="dash-card-icon accent-blue">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                    <line x1="16" y1="13" x2="8" y2="13" />
                                    <line x1="16" y1="17" x2="8" y2="17" />
                                </svg>
                            </div>
                            <h3>Saved Configs</h3>
                        </div>
                        <div class="stat-display">
                            <span class="stat-number" id="config-count">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Config Tab -->
            <div id="tab-config" class="tab-content">
                <div class="config-layout">
                    <!-- Editor Panel -->
                    <div class="editor-panel">
                        <div class="panel-header">
                            <div class="panel-title">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="16 18 22 12 16 6" />
                                    <polyline points="8 6 2 12 8 18" />
                                </svg>
                                <span>Lua Editor</span>
                                <span class="editor-status" id="editor-status"></span>
                            </div>
                            <div class="panel-actions">
                                <button id="clear-editor-btn" class="btn-clear" title="Clear Editor">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <line x1="18" y1="6" x2="6" y2="18" />
                                        <line x1="6" y1="6" x2="18" y2="18" />
                                    </svg>
                                    <span>Clear</span>
                                </button>
                                <button id="save-btn" class="btn-save" title="Save Config">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                                        <polyline points="17 21 17 13 7 13 7 21" />
                                        <polyline points="7 3 7 8 15 8" />
                                    </svg>
                                    <span>Save</span>
                                </button>
                            </div>
                        </div>
                        <div class="editor-container" id="editor-wrapper">
                            <textarea id="lua-editor"></textarea>
                        </div>
                    </div>

                    <!-- Store Configs Panel -->
                    <div class="store-panel">
                        <div class="panel-header">
                            <div class="panel-title">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
                                </svg>
                                <span>Stored Configs</span>
                            </div>
                            <span class="config-badge" id="config-badge">0</span>
                        </div>
                        <div class="config-list" id="config-list">
                            <!-- Configs will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Save Modal -->
    <div id="save-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Save Configuration</h3>
                <button id="modal-close-btn" class="modal-close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <label for="config-name-input">Configuration Name</label>
                <input type="text" id="config-name-input" placeholder="e.g., Farm Script v2">
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="btn-modal btn-cancel">Cancel</button>
                <button id="modal-ok-btn" class="btn-modal btn-confirm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span id="modal-save-label">Save</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
